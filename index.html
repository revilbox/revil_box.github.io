<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Сайт</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 15px;
            font-size: 2rem;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Привет от GitHub Pages!</h1>
        <p>Если ты видишь этот текст, значит код успешно заработал. Это твоя первая современная карточка с темной темой.</p>
    </div>

</body>
</html>
